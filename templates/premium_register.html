{% extends 'base.html' %}
{% load static %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* --- COSMIC THEME VARIABLES --- */
    :root {
        --glass-bg: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.2);
        --input-bg: rgba(240, 244, 255, 0.9);
        --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        --text-main: #1e293b;
        --text-light: #64748b;
    }

    /* OVERRIDE BASE BACKGROUND TO MATCH IMAGE */
    body {
        /* Deep Space Gradient */
        background: radial-gradient(circle at 10% 20%, rgb(30, 58, 138) 0%, rgb(15, 23, 42) 90%) !important;
        font-family: 'Inter', sans-serif;
    }

    /* MAIN LAYOUT WRAPPER */
    .cosmic-wrapper {
        min-height: 90vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }

    /* THE GLASS CARD */
    .glass-panel {
        display: flex;
        width: 100%;
        max-width: 1100px;
        background: rgba(255, 255, 255, 0.05); /* Very transparent */
        backdrop-filter: blur(20px); /* The "Frosted" look */
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 24px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        overflow: hidden;
        position: relative;
    }

    /* GLOWING ORBS (Background Decoration) */
    .orb {
        position: absolute;
        border-radius: 50%;
        filter: blur(80px);
        z-index: -1;
    }
    .orb-1 { top: -50px; left: -50px; width: 300px; height: 300px; background: rgba(59, 130, 246, 0.4); }
    .orb-2 { bottom: -50px; right: -50px; width: 300px; height: 300px; background: rgba(139, 92, 246, 0.3); }

    /* --- LEFT SIDE: PHOTO --- */
    .photo-section {
        width: 300px;
        padding: 40px;
        border-right: 1px solid rgba(255, 255, 255, 0.1);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        background: rgba(255, 255, 255, 0.02);
    }

    .photo-circle {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        background: linear-gradient(135deg, #e0f2fe, #bfdbfe);
        border: 4px solid rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        margin-bottom: 20px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .photo-circle i { font-size: 60px; color: #3b82f6; opacity: 0.5; }
    .photo-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }

    .upload-btn-label {
        background: rgba(255, 255, 255, 0.1);
        border: 1px solid rgba(255, 255, 255, 0.3);
        color: white;
        padding: 10px 20px;
        border-radius: 12px;
        font-size: 13px;
        cursor: pointer;
        transition: 0.3s;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .upload-btn-label:hover { background: rgba(255, 255, 255, 0.2); }
    
    .photo-hint {
        color: rgba(255, 255, 255, 0.5);
        font-size: 11px;
        margin-top: 10px;
    }

    /* --- RIGHT SIDE: FORM --- */
    .form-section {
        flex: 1;
        padding: 40px;
        background: rgba(255, 255, 255, 0.6); /* Semi-transparent white overlay */
    }

    .header-area { margin-bottom: 30px; }
    .header-area h2 { color: #1e3a8a; font-weight: 700; font-size: 24px; margin-bottom: 5px; }
    .header-area p { color: #64748b; font-size: 14px; }

    .section-label {
        color: #3b82f6;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 15px;
        margin-top: 25px;
    }
    .section-label:first-child { margin-top: 0; }

    /* GRID SYSTEM */
    .grid-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
    .full-width { grid-column: span 2; }

    /* INPUT STYLES */
    .field-wrap { display: flex; flex-direction: column; }
    .field-wrap label {
        font-size: 12px;
        font-weight: 600;
        color: #475569;
        margin-bottom: 6px;
    }
    
    .modern-input {
        background: #f8fafc;
        border: 1px solid #cbd5e1;
        padding: 12px 15px;
        border-radius: 8px;
        font-size: 14px;
        color: #334155;
        transition: 0.2s;
    }
    .modern-input:focus {
        background: white;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        outline: none;
    }

    /* BOTTOM ACTIONS */
    .action-row {
        margin-top: 30px;
        display: flex;
        justify-content: flex-end;
        gap: 15px;
        padding-top: 20px;
        border-top: 1px solid rgba(0,0,0,0.05);
    }

    .btn-cancel {
        padding: 12px 30px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        background: transparent;
        color: #64748b;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
    }
    .btn-cancel:hover { background: #f1f5f9; color: #334155; }

    .btn-register {
        padding: 12px 35px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(90deg, #3b82f6, #2563eb);
        color: white;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        cursor: pointer;
        transition: 0.3s;
    }
    .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4); }

    /* Responsive */
    @media (max-width: 900px) {
        .glass-panel { flex-direction: column; }
        .photo-section { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 20px; }
        .grid-row { grid-template-columns: 1fr; }
        .full-width { grid-column: span 1; }
    }
</style>

<div class="cosmic-wrapper">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <form method="POST" enctype="multipart/form-data" class="glass-panel">
        {% csrf_token %}
        
        <div class="photo-section">
            <div class="photo-circle" id="previewContainer">
                <i class="fa-solid fa-user"></i>
                <img id="imgPreview" src="#" alt="Preview">
            </div>
            
            <label for="id_photo" class="upload-btn-label">
                <i class="fa-solid fa-camera"></i> Upload Photo
            </label>
            <input type="file" name="photo" id="id_photo" accept="image/*" style="display:none;" onchange="showPreview(this)">
            <p class="photo-hint">Supports jpg, png. Max 2MB.</p>

            <div style="margin-top: 40px; width: 100%;">
                <div style="display:flex; justify-content:space-between; color:white; font-size:12px; margin-bottom:8px;">
                    <span>Profile Completion</span>
                    <span id="completionPct">0%</span>
                </div>
                <div style="height:6px; background:rgba(255,255,255,0.2); border-radius:3px; overflow:hidden;">
                    <div id="completionBar" style="width:0%; height:100%; background:#60a5fa; border-radius:3px; transition:width 0.4s ease;"></div>
                </div>
                <p id="completionHint" style="font-size:11px; color:#94a3b8; margin-top:10px;"></p>
            </div>
        </div>

        <div class="form-section">
            
            <div class="header-area">
                <h2>New Patient Registration</h2>
                <p>Enter patient details to initialize monitoring system.</p>
            </div>

            <div class="section-label">Required Information</div>

            <div class="grid-row">
                <div class="field-wrap">
                    <label>First Name <span style="color:red">*</span></label>
                    <input type="text" name="first_name" class="modern-input" placeholder="e.g. Sarah" required>
                </div>
                <div class="field-wrap">
                    <label>Last Name <span style="color:red">*</span></label>
                    <input type="text" name="last_name" class="modern-input" placeholder="e.g. Connor" required>
                </div>
            </div>

            <div class="grid-row">
                <div class="field-wrap">
                    <label>Age <span style="color:red">*</span></label>
                    <input type="number" name="age" class="modern-input" placeholder="Years" required>
                </div>
                <div class="field-wrap">
                    <label>Gender <span style="color:red">*</span></label>
                    <select name="gender" class="modern-input" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
            </div>

            <div class="grid-row">
                <div class="field-wrap">
                    <label>Blood Group <span style="color:red">*</span></label>
                    <select name="blood_group" class="modern-input" required>
                        <option value="" disabled selected>Select Blood Group</option>
                        <option value="A+">A+</option><option value="A-">A-</option>
                        <option value="B+">B+</option><option value="B-">B-</option>
                        <option value="AB+">AB+</option><option value="AB-">AB-</option>
                        <option value="O+">O+</option><option value="O-">O-</option>
                    </select>
                </div>
                <div class="field-wrap">
                    <label>Contact Number <span style="color:red">*</span></label>
                    <input type="text" name="contact" class="modern-input" placeholder="+1 555..." required>
                </div>
            </div>

            <div class="grid-row">
                <div class="field-wrap full-width">
                    <label>Email Address <span style="color:red">*</span></label>
                    <input type="email" name="email" class="modern-input" placeholder="email@example.com" required>
                </div>
            </div>

            <div class="grid-row">
                <div class="field-wrap">
                    <label>Monitoring Purpose <span style="color:red">*</span></label>
                    <select name="purpose" class="modern-input" required>
                        <option value="" disabled selected>Select Purpose</option>
                        <option value="Routine Check">Routine Check</option>
                        <option value="Fever">Fever / Infection</option>
                        <option value="Critical">Critical Observation</option>
                    </select>
                </div>
                <div class="field-wrap">
                    <label>Department <span style="color:red">*</span></label>
                    <select name="department" class="modern-input" required>
                        <option value="" disabled selected>Select Dept</option>
                        <option value="General">General Ward</option>
                        <option value="Cardiology">Cardiology</option>
                        <option value="ICU">ICU</option>
                    </select>
                </div>
            </div>

            <div class="section-label">Clinical Details (Optional)</div>

            <div class="grid-row">
                <div class="field-wrap full-width">
                    <label>Known Medical Conditions</label>
                    <input type="text" name="medical_conditions" class="modern-input" placeholder="e.g. Asthma, Diabetes, Hypertension...">
                </div>
            </div>

            <div class="grid-row">
                <div class="field-wrap full-width">
                    <label>Notes / Observations</label>
                    <textarea name="notes" class="modern-input" rows="2" placeholder="Additional notes or instructions..."></textarea>
                </div>
            </div>

            <div class="grid-row" style="background: rgba(59, 130, 246, 0.05); padding: 15px; border-radius: 10px; border: 1px dashed #3b82f6;">
                <div class="field-wrap" style="flex-direction: row; align-items: center; gap: 10px; margin-bottom: 0;">
                    <i class="fa-solid fa-ruler-vertical" style="color: #3b82f6;"></i>
                    <input type="number" name="height" class="modern-input" placeholder="Height (cm)" style="width: 100%;">
                </div>
                <div class="field-wrap" style="flex-direction: row; align-items: center; gap: 10px; margin-bottom: 0;">
                    <i class="fa-solid fa-weight-scale" style="color: #3b82f6;"></i>
                    <input type="number" name="weight" class="modern-input" placeholder="Weight (kg)" style="width: 100%;">
                </div>
            </div>

            <div style="margin-top: 15px;">
                <label style="color: white; font-size: 13px; display: flex; align-items: center; gap: 10px; cursor: pointer;">
                    <input type="checkbox" id="consentCheck" required style="width: 18px; height: 18px; accent-color: #3b82f6;">
                    I consent to real-time vital monitoring and data logging.
                </label>
            </div>

            <div class="action-row">
                <a href="{% url 'dashboard' %}" class="btn-cancel">Cancel</a>
                <button type="submit" class="btn-register">Register & Start Monitoring <i class="fa-solid fa-arrow-right" style="margin-left:8px;"></i></button>
            </div>

        </div>
    </form>
</div>

<script>
    const REQUIRED_FIELDS = [
        'first_name', 'last_name', 'age', 'gender', 'blood_group', 
        'contact', 'email', 'purpose', 'department', 'photo'
    ];

    function updateProgress() {
        let filledCount = 0;
        REQUIRED_FIELDS.forEach(name => {
            const el = document.querySelector('[name="' + name + '"]');
            if (!el) return;
            if (el.type === 'file') {
                if (el.files && el.files.length > 0) filledCount++;
            } else if (el.value && el.value.trim() !== "") {
                filledCount++;
            }
        });

        const pct = Math.round((filledCount / REQUIRED_FIELDS.length) * 100);
        const bar = document.getElementById('completionBar');
        const text = document.getElementById('completionPct');
        const btn = document.querySelector('.btn-register');

        if (bar) bar.style.width = pct + '%';
        if (text) text.textContent = pct + '%';
        
        if (btn) {
            if (pct < 100) {
                btn.style.opacity = '0.5';
                btn.style.cursor = 'not-allowed';
                btn.disabled = true;
            } else {
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
                btn.disabled = false;
            }
        }
    }

    function showPreview(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('imgPreview').style.display = 'block';
                document.querySelector('.photo-circle i').style.display = 'none';
                updateProgress();
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        const inputs = document.querySelectorAll('.modern-input, input[type="file"]');
        inputs.forEach(input => {
            input.addEventListener('input', updateProgress);
            input.addEventListener('change', updateProgress);
        });
        updateProgress();
    });
</script>
{% endblock %}
