{% extends 'base.html' %}
{% load static %}

{% block content %}

<div class="patient-reg-container">
    
    <div class="reg-header">
        <h2>New Patient Registration</h2>
        <p>Enter subject details for vital monitoring setup.</p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="reg-card">
        {% csrf_token %}

        <div class="reg-layout">
            
            <div class="photo-section">
                <div class="photo-preview" id="photoPreview">
                    <span id="initials">NP</span>
                    <img id="imgDisplay" src="#" alt="Patient Photo" style="display: none;">
                </div>
                
                <input type="file" name="photo" id="fileInput" accept="image/*" onchange="previewImage(this)">
                
                <label for="fileInput" class="upload-btn">
                    <i class="fa-solid fa-camera"></i> Upload Photo
                </label>
                <p class="upload-hint">Optional. Max size 2MB.</p>
            </div>

            <div class="details-section">
                
                <h4 class="section-title">Required Information</h4>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" placeholder="First Name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" placeholder="Last Name" required>
                    </div>
                </div>

                <div class="form-row three-col">
                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" name="age" placeholder="Age" required>
                    </div>
                    <div class="form-group">
                        <label>Gender</label>
                        <select name="gender" required>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Purpose</label>
                        <select name="purpose">
                            <option value="Routine Checkup">Routine Checkup</option>
                            <option value="Observation">Observation</option>
                            <option value="Critical Care">Critical Care</option>
                            <option value="Post-Op">Post-Op Recovery</option>
                        </select>
                    </div>
                </div>

                <div class="divider"></div>

                <h4 class="section-title">Optional Details</h4>

                <div class="form-group">
                    <label>Contact Number (Optional)</label>
                    <input type="text" name="contact" placeholder="e.g. +1 555-0123">
                </div>

                <div class="form-group">
                    <label>Known Medical Conditions (Optional)</label>
                    <input type="text" name="medical_conditions" placeholder="e.g. Asthma, Diabetes, Hypertension...">
                </div>

                <div class="form-group">
                    <label>Notes / Observations (Optional)</label>
                    <textarea name="notes" rows="3" placeholder="Any specific instructions..."></textarea>
                </div>

                <button type="submit" class="submit-btn">
                    <i class="fa-solid fa-user-check"></i> REGISTER PATIENT
                </button>

            </div>
        </div>
    </form>
</div>

<script>
    function previewImage(input) {
        var preview = document.getElementById('imgDisplay');
        var initials = document.getElementById('initials');
        
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
                initials.style.display = 'none';
            }
            
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

<style>
    /* --- Layout & Container --- */
    .patient-reg-container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 40px 20px;
    }

    .reg-header {
        text-align: center;
        margin-bottom: 30px;
    }
    .reg-header h2 { margin: 0; color: #1e293b; font-size: 28px; }
    .reg-header p { color: #64748b; margin-top: 5px; }

    .reg-card {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 4px 25px rgba(0,0,0,0.05);
        padding: 40px;
        border: 1px solid #e2e8f0;
    }

    .reg-layout {
        display: flex;
        gap: 50px;
    }

    /* --- Left Column: Photo --- */
    .photo-section {
        width: 250px;
        text-align: center;
        border-right: 1px solid #f1f5f9;
        padding-right: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 20px;
    }

    .photo-preview {
        width: 150px;
        height: 150px;
        background: #e2e8f0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 20px;
        overflow: hidden;
        position: relative;
    }

    #initials { font-size: 40px; color: #94a3b8; font-weight: bold; }
    #imgDisplay { width: 100%; height: 100%; object-fit: cover; }

    #fileInput { display: none; } /* Hide default ugly input */

    .upload-btn {
        background: #fff;
        border: 1px solid #cbd5e1;
        padding: 10px 20px;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        color: #475569;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-block;
    }

    .upload-btn:hover { background: #f8fafc; border-color: #94a3b8; }
    .upload-hint { font-size: 12px; color: #94a3b8; margin-top: 10px; }

    /* --- Right Column: Form Inputs --- */
    .details-section { flex: 1; }

    .section-title {
        color: #3b82f6; /* Medical Blue */
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 20px;
        font-weight: 700;
    }

    .form-row { display: flex; gap: 20px; margin-bottom: 20px; }
    .form-row.three-col .form-group { flex: 1; }
    .form-group { flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .form-group label {
        font-size: 13px;
        font-weight: 600;
        color: #334155;
    }

    .form-group input, .form-group select, .form-group textarea {
        padding: 12px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 14px;
        color: #1e293b;
        background: #f8fafc;
        transition: border 0.3s;
    }

    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
        border-color: #3b82f6;
        outline: none;
        background: #fff;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .divider { height: 1px; background: #e2e8f0; margin: 30px 0; }

    /* --- Submit Button --- */
    .submit-btn {
        width: 100%;
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        color: white;
        padding: 15px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 20px;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
    }

    /* --- Responsive --- */
    @media (max-width: 768px) {
        .reg-layout { flex-direction: column; }
        .photo-section { width: 100%; border-right: none; border-bottom: 1px solid #f1f5f9; padding-bottom: 30px; margin-bottom: 30px; }
        .form-row { flex-direction: column; }
    }
</style>

{% endblock %}
