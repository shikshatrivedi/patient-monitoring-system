{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Medi-Mon Access</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    <div class="medical-container">
        <div class="visual-side">
            <h2>P.M.S SYSTEM</h2>
            <p>INTENSIVE CARE UNIT • MODULE 1</p>
            
            <div class="ecg-container">
                <div class="ecg-line"></div>
            </div>
            
            <div style="margin-top: 30px; font-size: 12px; color: #00f2fe; border: 1px solid #00f2fe; padding: 5px 15px; border-radius: 20px;">
                ● SYSTEM OPERATIONAL
            </div>
        </div>

        <div class="form-side">
            <div class="form-header">
                <h3>Doctor Login</h3>
                <span>Please enter your secure credentials</span>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                {% if messages %}
                    {% for message in messages %}
                    <div class="error-box" style="color: red; margin-bottom: 10px; font-size: 0.9em;">
                        {{ message }}
                    </div>
                    {% endfor %}
                {% endif %}

                <div class="input-group">
                    <input type="text" name="username" placeholder="Doctor ID / Username" required 
                           style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required 
                           style="width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px;">
                </div>
                
                <button type="submit" class="btn-primary" style="cursor: pointer;">AUTHENTICATE</button>
            </form>

           <div class="links">
                <a href="{% url 'password_reset' %}">Forgot Password?</a>
                <a href="{% url 'register' %}">Create Account</a>
            </div>
        </div>
    </div>
</body>
</html>
