{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="glass-container">
        <div class="logo-area">
            <h1>RECOVERY</h1>
            <p>Enter Registered Mobile Number</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            {% if messages %}
                {% for message in messages %}
                <div style="color: #ff6b6b; font-size: 12px;">{{ message }}</div>
                {% endfor %}
            {% endif %}

            <input type="text" name="mobile_number" placeholder="Mobile Number" class="form-input" required>

            <button type="submit" class="btn-primary">SEND OTP</button>
        </form>

        <div class="links">
            <a href="{% url 'login' %}">Back to Login</a>
        </div>
    </div>
</body>
</html>
